<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Live Search Filter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>E-Commerce Live Search Filter</h1>

        <input type="text" id="searchInput" placeholder="Search products...">

        <div id="productList" class="product-container">

            <div class="product">
                <img src="https://via.placeholder.com/150">
                <h3>Apple iPhone</h3>
                <p>$799</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/150">
                <h3>Samsung Galaxy</h3>
                <p>$699</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/150">
                <h3>Wireless Earbuds</h3>
                <p>$99</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/150">
                <h3>Smart Watch</h3>
                <p>$149</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/150">
                <h3>Laptop</h3>
                <p>$999</p>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/150">
                <h3>Bluetooth Speaker</h3>
                <p>$59</p>
            </div>

        </div>

        <p id="noResult" class="hidden">No results found</p>

    </div>

    <script src="script.js"></script>
</body>
</html>
